services:
  - type: web
    name: certitrack-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true # Render auto-generates a secure value
      - key: DATABASE_URL
        sync: false # Set this manually in Render dashboard → Environment
      - key: PORT
        value: 5000
